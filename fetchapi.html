<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Fetch API CRUD</title>
    <style>
        /* Egyszerű reszponzív stílus a 3 ponthoz */
        body { font-family: sans-serif; padding: 20px; }
        #list { margin-top: 20px; }
        .item-row { margin-bottom: 10px; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

    <h2>Fetch API CRUD alkalmazás</h2>

    <div id="add-container">
        <input type="text" id="nameInput" placeholder="Név">
        <input type="number" id="ageInput" placeholder="Kor">
        <input type="text" id="skillsInput" placeholder="Képességek">
        <button onclick="addItem()">Hozzáadás</button>
    </div>

    <div id="edit-container" style="display:none; background: #f0f0f0; padding: 15px; margin: 15px 0;">
        <h3>Szerkesztés</h3>
        <input type="hidden" id="editId">
        <input type="text" id="editName">
        <input type="number" id="editAge">
        <input type="text" id="editSkills">
        <button onclick="updateItem()">Mentés</button>
        <button onclick="cancelEdit()">Mégse</button>
    </div>

    <ul id="list"></ul>

    <script src="fetchapi.js"></script>
</body>
</html>
